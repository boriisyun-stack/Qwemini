<!doctype html>
<html lang="ko">
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Qwemini</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#0b0b0d;color:#e9eaf0;font:16px system-ui,-apple-system,sans-serif}.app{height:100vh;display:flex;flex-direction:column;background:radial-gradient(ellipse 50% 45% at 50% 48%,#16244d 0,#0e1428 38%,#0b0b0d 75%)}header{text-align:center;padding:24px}.brand{font-weight:800;color:#87caff;font-size:20px}.brand span{font-size:13px;color:#858a99;margin-left:7px;font-weight:500}.chat{flex:1;width:min(1000px,calc(100% - 44px));margin:auto;overflow:auto;padding:80px 0 150px}.welcome{text-align:center;font-size:clamp(28px,4vw,48px);font-weight:300;color:#d9dbe5;padding-top:14vh}.row{margin:18px 0;white-space:pre-wrap;overflow-wrap:anywhere;line-height:1.6}.user{text-align:right}.user span{display:inline-block;background:#1d1e23;border-radius:24px;padding:12px 18px;max-width:75%}.assistant{font-size:18px}.composer{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);width:min(820px,calc(100% - 44px));display:flex;gap:12px;align-items:center;background:#202124;border-radius:38px;padding:10px 14px 10px 22px;box-shadow:0 16px 50px #0009}.composer textarea{flex:1;resize:none;border:0;outline:0;background:transparent;color:#fff;font:inherit;min-height:30px;max-height:150px}.send{width:46px;height:46px;border:0;border-radius:50%;background:#2e55c7;color:#fff;font-size:25px;cursor:pointer}.send:disabled{opacity:.5}.note{text-align:center;color:#777b88;font-size:12px;margin-top:9px}
</style>
<main class="app"><header><div class="brand">Qwemini<span>Galiboole이 개발한 AI</span></div></header><section id="chat" class="chat"><div id="welcome" class="welcome">사용자님, 무엇을 도와드릴까요?</div></section><div class="composer"><select id="profile" aria-label="모델 프로필"><option value="qwemini-flash-lite">Flash-lite · Top-6</option><option value="qwemini-flash">Flash · Top-8</option><option value="qwemini-pro" selected>Pro · Top-10</option></select><textarea id="input" rows="1" placeholder="Qwemini에게 물어보기"></textarea><button id="send" class="send" aria-label="전송">↑</button></div><div class="note">Qwemini는 AI이며 실수를 할 수 있습니다.</div></main>
<script>
const API='https://interracial-principal-mpg-times.trycloudflare.com';const chat=document.querySelector('#chat'),input=document.querySelector('#input'),send=document.querySelector('#send'),profile=document.querySelector('#profile');let history=[],busy=false;
function row(kind,text){const el=document.createElement('div');el.className='row '+kind;if(kind==='user'){const b=document.createElement('span');b.textContent=text;el.append(b)}else el.textContent=text;chat.append(el);chat.scrollTop=chat.scrollHeight;return el}
function resize(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,150)+'px'}
async function submit(){const text=input.value.trim();if(!text||busy)return;busy=true;send.disabled=true;document.querySelector('#welcome')?.remove();input.value='';resize();history.push({role:'user',content:text});row('user',text);const out=row('assistant','분석을 시작하는 중…');let answer='';try{const res=await fetch(API+'/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversation_id:'pages-qwemini',messages:history,stream:true,max_tokens:4096})});if(!res.ok)throw Error(await res.text());const reader=res.body.getReader(),decoder=new TextDecoder();let buf='';while(true){const part=await reader.read();if(part.done)break;buf+=decoder.decode(part.value,{stream:true});const lines=buf.split('\n');buf=lines.pop();for(const line of lines){if(!line.startsWith('data: '))continue;const data=JSON.parse(line.slice(6));if(data.done)continue;const chunk=data.choices?.[0]?.delta?.content||'';answer+=chunk;out.textContent=answer;chat.scrollTop=chat.scrollHeight}}history.push({role:'assistant',content:answer})}catch(err){out.textContent='연결 오류: '+err.message}finally{busy=false;send.disabled=false;input.focus()}}
input.addEventListener('input',resize);input.addEventListener('keydown',e=>{if(e.isComposing)return;if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit()}});send.addEventListener('click',submit);
</script>
</html>
